services:
  db:
    image: postgres:16-alpine
    container_name: arocr_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arocr}
      POSTGRES_USER: ${POSTGRES_USER:-arocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arocr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arocr_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arocr} -d ${POSTGRES_DB:-arocr}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: arocr_web
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./arocr:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arocr_net
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: arocr_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - arocr_net

  frontend:
    build:
      context: ./front-aro
      dockerfile: Dockerfile
    container_name: arocr_frontend
    restart: unless-stopped
    ports:
      - "13082:8080"
    env_file:
      - ./front-aro/.env.development
    volumes:
      - ./front-aro:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_HOST: "localhost"
      WDS_SOCKET_PORT: "13082"
    depends_on:
      - web
    networks:
      - arocr_net

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  arocr_net:
    driver: bridge
