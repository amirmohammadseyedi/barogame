# Metabase جدا از stack اصلی — فقط وقتی لازم داری:
#   docker-compose -f docker-compose.metabase.yml up -d
#   docker-compose -f docker-compose.metabase.yml down
#
# stack اصلی (db و ...) باید بالا باشد تا به PostgreSQL وصل شود.

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_arocr
    restart: unless-stopped
    ports:
      - "${METABASE_EXPOSE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_arocr_data:/metabase-data
    networks:
      - arocr_net

volumes:
  metabase_arocr_data:

networks:
  arocr_net:
    external: true
    name: arocr_net
